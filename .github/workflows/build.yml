name: Build

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Create debug keystore
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            "$JAVA_HOME/bin/keytool" -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
      - name: Test, lint, and build
        run: chmod +x ./gradlew && ./gradlew :app:verifyRoomSchema :app:lintDebug :app:testDebugUnitTest :app:assembleDebug :app:assembleRelease :app:verifyFdroidReadiness :app:verifyFdroidMetadata -Pandroid.enableComposeCompilerMetrics=true -Pandroid.enableComposeCompilerReports=true --console=plain
      - name: F-Droid profile build
        run: ./gradlew -PopenTaskerDistribution=fdroid :app:assembleRelease :app:verifyFdroidReadiness :app:verifyFdroidMetadata --console=plain
      - name: Play manifest policy
        run: ./gradlew -PopenTaskerDistribution=play :app:verifyPlayManifestPolicy --console=plain
      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
          retention-days: 14
      - name: Upload Compose compiler reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compose-compiler-reports
          path: app/build/compose_compiler/
          retention-days: 14
