name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9
      
      - name: Build release APK
        run: gradle assembleRelease
      
      - name: Find and rename APK
        run: |
          # Find the built APK
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found in app/build/outputs/apk"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          
          # Rename and move to release directory
          mkdir -p app/build/outputs/apk/release
          cp "$APK_PATH" app/build/outputs/apk/release/OpenTasker-v${{ inputs.version }}-release.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          files: app/build/outputs/apk/release/OpenTasker-v${{ inputs.version }}-release.apk
          body: |
            # OpenTasker v${{ inputs.version }}
            
            Automated release build.
            
            **APK:** Install on your device via `adb install OpenTasker-v${{ inputs.version }}-release.apk`
