name: Release Build
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.1)"
        required: true
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Create debug keystore
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            "$JAVA_HOME/bin/keytool" -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
      - name: Verify version matches
        run: |
          APP_VERSION=$(grep 'val appVersionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          if [ "$APP_VERSION" != "${{ inputs.version }}" ]; then
            echo "ERROR: Workflow version (${{ inputs.version }}) does not match appVersionName ($APP_VERSION)"
            exit 1
          fi
      - name: Validate
        run: chmod +x ./gradlew && ./gradlew :app:lint :app:testDebugUnitTest :app:assembleDebug :app:verifyFdroidReadiness :app:verifyFdroidMetadata
      - name: Build F-Droid release profile
        run: ./gradlew -PopenTaskerDistribution=fdroid :app:assembleRelease :app:verifyFdroidReadiness :app:verifyFdroidMetadata
      - name: Verify Play manifest policy
        run: ./gradlew -PopenTaskerDistribution=play :app:verifyPlayManifestPolicy
      - name: Build release APK
        run: ./gradlew :app:assembleRelease
      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No release APK found"
            exit 1
          fi
          mv "$APK_PATH" OpenTasker-v${{ inputs.version }}.apk
      - name: Generate checksums
        run: |
          sha256sum OpenTasker-v${{ inputs.version }}.apk > OpenTasker-v${{ inputs.version }}.apk.sha256
      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view v${{ inputs.version }} >/dev/null 2>&1 \
            || gh release create v${{ inputs.version }} --title "OpenTasker v${{ inputs.version }}" --generate-notes
          gh release upload v${{ inputs.version }} OpenTasker-v${{ inputs.version }}.apk OpenTasker-v${{ inputs.version }}.apk.sha256 --clobber
