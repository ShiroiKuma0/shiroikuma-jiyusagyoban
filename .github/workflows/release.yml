name: Build Release APK
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew && ./gradlew :app:assembleRelease
      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk OpenTasker-v${{ inputs.version }}.apk
      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view v${{ inputs.version }} >/dev/null 2>&1 \
            || gh release create v${{ inputs.version }} --title "OpenTasker v${{ inputs.version }}" --notes "Automated build."
          gh release upload v${{ inputs.version }} OpenTasker-v${{ inputs.version }}.apk --clobber
