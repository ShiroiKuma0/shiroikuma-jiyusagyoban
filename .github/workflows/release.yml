name: Release Build
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.1)"
        required: true
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Create debug keystore
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            "$JAVA_HOME/bin/keytool" -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
      - name: Validate
        run: chmod +x ./gradlew && ./gradlew :app:lint :app:testDebugUnitTest :app:assembleDebug :app:verifyFdroidReadiness :app:verifyFdroidMetadata
      - name: Build F-Droid release profile
        run: ./gradlew -PopenTaskerDistribution=fdroid :app:assembleRelease :app:verifyFdroidReadiness :app:verifyFdroidMetadata
      - name: Build release APK
        run: ./gradlew :app:assembleRelease
      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No release APK found"
            exit 1
          fi
          mv "$APK_PATH" OpenTasker-v${{ inputs.version }}.apk
      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view v${{ inputs.version }} >/dev/null 2>&1 \
            || gh release create v${{ inputs.version }} --title "OpenTasker v${{ inputs.version }}" --notes-file CHANGELOG.md
          gh release upload v${{ inputs.version }} OpenTasker-v${{ inputs.version }}.apk --clobber
