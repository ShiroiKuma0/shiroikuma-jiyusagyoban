Description: |-
  OpenTasker is a local-first Android automation app for profiles, contexts,
  tasks, actions, guided templates, open JSON bundles, sharing manifests,
  Tasker migration planning, FOSS geofence evaluation, runtime template
  argument expansion, per-expression template diagnostics, optional Termux
  script readiness, and platform-aware setup checks.

