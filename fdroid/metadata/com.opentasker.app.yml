Description: |-
  OpenTasker is a local-first Android automation app for profiles, contexts,
  tasks, actions, guided templates, open JSON bundles, sharing manifests,
  Tasker migration review, FOSS geofence evaluation, runtime template
  argument and condition expansion, per-expression template diagnostics,
  explicit regex template policy, optional Termux script readiness, and
  platform-aware setup checks.

